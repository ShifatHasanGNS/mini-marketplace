<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Seller Dashboard</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            rel="stylesheet"
        />

        <style>
            body {
                background: #f4f6f9;
                font-family: Segoe UI;
            }

            .sidebar {
                background: #1e293b;
                color: white;
                min-height: 100vh;
                padding-top: 20px;
                position: fixed;
                width: 220px;
            }

            .sidebar h4 {
                padding: 20px;
                text-align: center;
            }

            .sidebar a {
                display: block;
                color: white;
                padding: 12px 20px;
                text-decoration: none;
                transition: 0.3s;
            }

            .sidebar a:hover {
                background: #334155;
                padding-left: 25px;
            }

            .main {
                margin-left: 240px;
                padding: 25px;
            }

            .card {
                border: none;
                border-radius: 12px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            }

            .stat-card {
                color: white;
            }

            .bg-products {
                background: linear-gradient(45deg, #3b82f6, #1d4ed8);
            }

            .bg-selling {
                background: linear-gradient(45deg, #22c55e, #15803d);
            }

            .table {
                background: white;
                border-radius: 10px;
                overflow: hidden;
            }

            .section {
                display: none;
            }

            .section.active {
                display: block;
                animation: fade 0.4s;
            }

            @keyframes fade {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
        </style>
    </head>

    <body>
        <div class="sidebar">
            <h4>Seller Panel</h4>

            <a th:href="@{'/seller/dashboard/' + ${sellerName}}">
                <i class="fa fa-home"></i> Dashboard
            </a>

            <a th:href="@{'/seller/products/' + ${sellerName}}">
                <i class="fa fa-box"></i> My Products
            </a>

            <a th:href="@{'/seller/orders/' + ${sellerName}}">
                <i class="fa fa-cart-shopping"></i> My Orders
            </a>

            <a data-bs-toggle="modal" data-bs-target="#addProductModal">
                <i class="fa fa-plus"></i> Add Product
            </a>

            <a th:href="@{/logout}"> <i class="fa fa-sign-out"></i> Logout </a>
        </div>

        <div class="main">
            <!-- DASHBOARD -->
            <div
                th:class="'section ' + (${activeSection}=='dashboard' ? 'active' : '')"
            >
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card stat-card bg-products p-3">
                            <h6>Total Products</h6>
                            <h3 th:text="${products.size()}">0</h3>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card stat-card bg-selling p-3">
                            <h6>Total Selling</h6>
                            <h3 th:text="${totalSelling}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PRODUCTS -->
            <div
                th:class="'section ' + (${activeSection}=='products' ? 'active' : '')"
            >
                <h3>My Products</h3>

                <div class="table-responsive">
                    <table class="table table-striped table-hover mt-3">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Origin</th>
                                <th>Picture</th>
                                <th>Price</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="p:${products}">
                                <td th:text="${p.id}"></td>
                                <td th:text="${p.name}"></td>
                                <td th:text="${p.origin}"></td>

                                <td>
                                    <img
                                        th:src="${p.pic}"
                                        style="height: 50px; width: 50px"
                                    />
                                </td>

                                <td th:text="${p.price}"></td>

                                <td>
                                    <button
                                        class="btn btn-warning btn-sm"
                                        type="button"
                                        th:attr="data-bs-toggle='modal'"
                                        th:attrappend="data-bs-target='#editModal__' + ${p.id}"
                                    >
                                        Edit
                                    </button>

                                    <form
                                        th:action="@{'/seller/products/' + ${p.id}}"
                                        method="post"
                                        style="display: inline"
                                    >
                                        <input
                                            type="hidden"
                                            name="_method"
                                            value="delete"
                                        />
                                        <button
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('Delete?');"
                                        >
                                            Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ORDERS -->
            <div
                th:class="'section ' + (${activeSection}=='orders' ? 'active' : '')"
            >
                <h3>My Orders</h3>

                <div class="table-responsive">
                    <table class="table table-striped table-hover mt-3">
                        <thead class="table-dark">
                            <tr>
                                <th>Customer</th>
                                <th>Mobile</th>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Address</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="o:${myOrders}">
                                <td th:text="${o.customerName}"></td>
                                <td th:text="${o.mobileNumber}"></td>
                                <td th:text="${o.productName}"></td>
                                <td th:text="${o.price}"></td>
                                <td th:text="${o.deliveryAddress}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ADD PRODUCT MODAL -->

        <div class="modal fade" id="addProductModal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5>Add Product</h5>
                        <button
                            type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>

                    <div class="modal-body">
                        <form th:action="@{/seller/products}" method="post">
                            <input
                                class="form-control mb-3"
                                name="name"
                                placeholder="Name"
                                required
                            />

                            <input
                                class="form-control mb-3"
                                name="origin"
                                placeholder="Origin"
                                required
                            />

                            <input
                                class="form-control mb-3"
                                name="pic"
                                placeholder="Picture URL"
                                required
                            />

                            <input
                                class="form-control mb-3"
                                name="price"
                                type="number"
                                step="0.01"
                                placeholder="Price"
                                required
                            />

                            <button class="btn btn-success w-100">
                                Add Product
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- EDIT PRODUCT MODALS -->

        <div th:each="p:${products}">
            <div class="modal fade" th:id="'editModal__' + ${p.id}">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header bg-warning">
                            <h5>Edit Product</h5>
                            <button
                                type="button"
                                class="btn-close"
                                data-bs-dismiss="modal"
                            ></button>
                        </div>

                        <div class="modal-body">
                            <form
                                th:action="@{'/seller/products/' + ${p.id}}"
                                method="post"
                            >
                                <input
                                    type="hidden"
                                    name="_method"
                                    value="put"
                                />

                                <input
                                    class="form-control mb-3"
                                    name="name"
                                    th:value="${p.name}"
                                    required
                                />

                                <input
                                    class="form-control mb-3"
                                    name="origin"
                                    th:value="${p.origin}"
                                    required
                                />

                                <input
                                    class="form-control mb-3"
                                    name="pic"
                                    th:value="${p.pic}"
                                    required
                                />

                                <input
                                    class="form-control mb-3"
                                    name="price"
                                    type="number"
                                    step="0.01"
                                    th:value="${p.price}"
                                    required
                                />

                                <button class="btn btn-warning w-100">
                                    Save
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
