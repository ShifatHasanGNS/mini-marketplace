<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>Buyer Dashboard</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            rel="stylesheet"
        />

        <style>
            body {
                background: #f5f7fb;
                font-family: Segoe UI;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                width: 230px;
                height: 100%;
                background: #1e293b;
                color: white;
                padding-top: 20px;
            }

            .sidebar h4 {
                text-align: center;
                margin-bottom: 30px;
            }

            .sidebar a {
                display: block;
                color: white;
                padding: 12px 20px;
                text-decoration: none;
            }

            .sidebar a:hover {
                background: #334155;
            }

            .main {
                margin-left: 240px;
                padding: 30px;
            }

            .card {
                border: none;
                border-radius: 12px;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            }

            .product-card img {
                height: 170px;
                object-fit: cover;
            }

            .price {
                color: green;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <!-- SIDEBAR -->

        <div class="sidebar">
            <h4>Buyer Panel</h4>

            <a th:href="@{/buyer/dashboard/{username}(username=${username})}">
                <i class="fa fa-home"></i> Dashboard
            </a>

            <a th:href="@{/buyer/products/{username}(username=${username})}">
                <i class="fa fa-box"></i> Products
            </a>

            <a th:href="@{/buyer/cart/{username}(username=${username})}">
                <i class="fa fa-shopping-cart"></i>
                Cart
                <span
                    class="badge bg-warning text-dark"
                    th:text="${cartSize}"
                ></span>
            </a>

            <a th:href="@{/buyer/orders/{username}(username=${username})}">
                <i class="fa fa-history"></i> Orders
            </a>

            <a th:href="@{/logout}"> <i class="fa fa-sign-out"></i> Logout </a>
        </div>

        <!-- MAIN CONTENT -->

        <div class="main">
            <h2 class="mb-4">
                Welcome
                <span th:text="${username}"></span>
            </h2>

            <!-- SUCCESS MESSAGE -->

            <div th:if="${successMessage}" class="alert alert-success">
                <span th:text="${successMessage}"></span>
            </div>

            <!-- DASHBOARD STATS -->

            <div th:if="${totalSpent != null}" class="row mb-4">
                <div class="col-md-4">
                    <div class="card p-3">
                        <h6>Total Spending</h6>

                        <h4 class="text-success">
                            ৳ <span th:text="${totalSpent}"></span>
                        </h4>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card p-3">
                        <h6>Top Sellers</h6>

                        <div>
                            <span
                                class="badge bg-primary me-2"
                                th:each="s : ${topSellers}"
                                th:text="${s}"
                            >
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PRODUCTS -->

            <div th:if="${products != null}">
                <h4 class="mb-3">All Products</h4>

                <div class="row">
                    <div class="col-md-3 mb-4" th:each="p : ${products}">
                        <div class="card product-card">
                            <img th:src="${p.pic}" />

                            <div class="card-body">
                                <h5 th:text="${p.name}"></h5>

                                <p
                                    class="price"
                                    th:text="'৳ ' + ${p.price}"
                                ></p>

                                <p>
                                    Seller:
                                    <span th:text="${p.sellerName}"></span>
                                </p>

                                <p>
                                    Origin:
                                    <span th:text="${p.origin}"></span>
                                </p>

                                <a
                                    class="btn btn-success w-100"
                                    th:href="@{/buyer/add-to-cart/{id}/{username}
(id=${p.id},username=${username})}"
                                >
                                    Add to Cart
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CART -->

            <div th:if="${cart != null}">
                <h4 class="mb-3">Your Cart</h4>

                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Seller</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="p : ${cart}">
                            <td th:text="${p.name}"></td>

                            <td th:text="'৳ ' + ${p.price}"></td>

                            <td th:text="${p.sellerName}"></td>

                            <td>
                                <a
                                    class="btn btn-danger btn-sm"
                                    th:href="@{/buyer/remove-from-cart/{id}/{username}
(id=${p.id},username=${username})}"
                                >
                                    Remove
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- CHECKOUT FORM -->

                <div class="card p-4 mt-4">
                    <h5>Checkout</h5>

                    <form th:action="@{/buyer/checkout}" method="post">
                        <input
                            type="hidden"
                            name="username"
                            th:value="${username}"
                        />

                        <div class="mb-3">
                            <label>Delivery Address</label>

                            <input
                                type="text"
                                name="address"
                                class="form-control"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label>Mobile</label>

                            <input
                                type="text"
                                name="mobile"
                                class="form-control"
                                required
                            />
                        </div>

                        <div class="mb-3">
                            <label>Coupon</label>

                            <div class="input-group">
                                <input
                                    type="text"
                                    id="couponCode"
                                    name="couponCode"
                                    class="form-control"
                                />

                                <button
                                    type="button"
                                    class="btn btn-success"
                                    onclick="checkCoupon()"
                                >
                                    OK
                                </button>
                            </div>
                        </div>

                        <div id="couponResult"></div>

                        <button class="btn btn-primary mt-3">Checkout</button>
                    </form>
                </div>
            </div>

            <!-- ORDER HISTORY -->

            <div th:if="${orders != null}">
                <h4 class="mb-3">Order History</h4>

                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Seller</th>
                            <th>Origin</th>
                            <th>Date</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="o : ${orders}">
                            <td th:text="${o.productName}"></td>

                            <td th:text="'৳ ' + ${o.price}"></td>

                            <td th:text="${o.sellerName}"></td>

                            <td th:text="${o.origin}"></td>

                            <td th:text="${o.orderDate}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            function checkCoupon() {
                let code = document.getElementById("couponCode").value;

                fetch("/buyer/check-coupon?code=" + code)
                    .then((response) => response.json())

                    .then((data) => {
                        let result = document.getElementById("couponResult");

                        if (data.valid) {
                            result.innerHTML =
                                "<div class='alert alert-success'>Coupon valid! Discount: " +
                                data.discount +
                                "% applied.</div>";
                        } else {
                            result.innerHTML =
                                "<div class='alert alert-danger'>Invalid coupon</div>";
                        }
                    });
            }
        </script>
    </body>
</html>
