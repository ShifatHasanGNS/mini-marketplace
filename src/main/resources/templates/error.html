<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Mini Marketplace</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f8fafc;
            color: #1e293b;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .box {
            width: min(560px, 92vw);
            text-align: center;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        p {
            margin: 0 0 20px;
            color: #475569;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: #0ea5e9;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>Something went wrong</h1>
    <p>The requested page cannot be displayed right now.</p>
    <a th:href="@{/redirect-dashboard}">Return to Dashboard</a>
</div>
</body>
</html>
