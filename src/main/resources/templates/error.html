<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Mini Marketplace - Something Went Wrong</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Roboto", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .error-container {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            width: 460px;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .error-icon-wrap i {
            font-size: 36px;
            color: #fff;
        }

        .error-code {
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .error-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .error-divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .error-message-box {
            background: #f8f5ff;
            border-left: 4px solid #764ba2;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 28px;
            text-align: left;
        }

        .error-message-box .label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #764ba2;
            margin-bottom: 4px;
        }

        .error-message-box p {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            word-break: break-word;
        }

        .error-type-badge {
            display: inline-block;
            background: #ede9fe;
            color: #6d28d9;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .btn-home {
            display: inline-block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-home:hover {
            background: linear-gradient(90deg, #5a67d8, #6b46c1);
            transform: translateY(-2px);
            color: #fff;
        }

        .btn-back {
            display: inline-block;
            margin-top: 12px;
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .error-container {
                width: 92%;
                padding: 40px 24px;
            }

            .error-code {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="error-container">

        <!-- Icon -->
        <div class="error-icon-wrap">
            <!-- Icon switches based on error code -->
            <i th:if="${errorCode == 404}" class="fa-solid fa-magnifying-glass"></i>
            <i th:if="${errorCode == 403}" class="fa-solid fa-lock"></i>
            <i th:if="${errorCode == 401}" class="fa-solid fa-user-lock"></i>
            <i th:if="${errorCode != null and errorCode >= 500}" class="fa-solid fa-server"></i>
            <i th:if="${errorCode == null}" class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <!-- Error Code -->
        <div class="error-code" th:text="${errorCode != null ? errorCode : '⚠'}"></div>

        <!-- Title -->
        <div class="error-title" th:text="${errorTitle != null ? errorTitle : 'Oops! Something went wrong'}"></div>

        <!-- Divider -->
        <div class="error-divider"></div>

        <!-- Error type badge -->
        <div class="error-type-badge" th:if="${errorType != null}" th:text="${errorType}"></div>

        <!-- Error message -->
        <div class="error-message-box">
            <div class="label">What happened</div>
            <p
                th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred. Please try again or contact support if the problem persists.'}">
            </p>
        </div>

        <!-- Actions -->
        <a class="btn-home" th:href="@{/}">
            <i class="fa-solid fa-house" style="margin-right: 8px;"></i>
            Go to Home
        </a>

        <br />
        <a class="btn-back" href="javascript:history.back()">
            <i class="fa-solid fa-arrow-left" style="margin-right: 4px;"></i>
            Go Back
        </a>

    </div>
</body>

</html>
