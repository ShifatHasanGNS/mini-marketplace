spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}

server.port=${PORT:8080}

# Ensure schema is initialized on start (safe for local/dev); do not drop data.
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

spring.jpa.database-platform=${DB_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=none
