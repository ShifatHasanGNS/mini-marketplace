spring:
  datasource:
    url: ${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
    username: ${JDBC_DATABASE_USERNAME:sa}
    password: ${JDBC_DATABASE_PASSWORD:}
    driver-class-name: ${JDBC_DATABASE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${DB_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${DB_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    show-sql: true
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8080}
